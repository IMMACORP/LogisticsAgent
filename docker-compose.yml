services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: inquiry-agent-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inquiry_agent
    volumes:
      - inquiry_agent_pgdata:/var/lib/postgresql/data
      - ./apps/backend/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inquiry_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  inquiry_agent_pgdata:
